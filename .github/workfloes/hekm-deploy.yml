name: Helm Deploy to Minikube

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify tools
        run: |
          helm version
          kubectl version --client
          minikube status

      - name: Helm lint
        run: helm lint ./

      - name: Helm upgrade --install
        run: |
          helm upgrade --install my-release ./my-chart `
            --namespace my-demo-project `
            --wait `
            --timeout 2m

      - name: Verify deployment
        run: kubectl get pods -n my-demo-project